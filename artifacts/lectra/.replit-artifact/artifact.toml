kind = "web"
previewPath = "/"
title = "Lectra"
version = "1.0.0"
id = "artifacts/lectra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20942

[services.development]
run = "pnpm --filter @workspace/lectra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lectra", "run", "build" ]
publicDir = "artifacts/lectra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20942"
BASE_PATH = "/"
